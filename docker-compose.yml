version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: english_bot_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: english_speak_bot
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d english_speak_bot']
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: english_bot_app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/english_speak_bot?schema=public
      NODE_ENV: production
    ports:
      - '3000:3000'
    volumes:
      - voice_tmp:/app/tmp/voice
    command: >
      sh -c "npx prisma migrate deploy &&
             node dist/main"

volumes:
  postgres_data:
  voice_tmp:
